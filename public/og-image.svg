<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f22"/>
      <stop offset="50%" stop-color="#264027"/>
      <stop offset="100%" stop-color="#3c5233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b38a58"/>
      <stop offset="100%" stop-color="#6f732f"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="960" cy="315" r="180"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="300" fill="rgba(179,138,88,0.06)"/>
  <circle cx="-50" cy="550" r="250" fill="rgba(111,115,47,0.08)"/>

  <!-- Accent line -->
  <rect x="80" y="200" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="80" y="260" font-family="Arial,Helvetica,sans-serif" font-size="76" font-weight="700" fill="white">Ali Elömer</text>

  <!-- Subtitle -->
  <text x="80" y="310" font-family="Arial,Helvetica,sans-serif" font-size="28" fill="rgba(179,138,88,0.9)">Online Eğitim Sertifikaları · Tercümanlık</text>

  <!-- Description -->
  <text x="80" y="360" font-family="Arial,Helvetica,sans-serif" font-size="20" fill="rgba(255,255,255,0.4)">Eğitim · İdari İşler · Arapça &amp; Türkçe</text>

  <!-- Tags -->
  <rect x="80" y="400" width="120" height="36" rx="8" fill="rgba(179,138,88,0.15)"/>
  <text x="140" y="423" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(179,138,88,0.9)">Portföy 2026</text>

  <rect x="210" y="400" width="100" height="36" rx="8" fill="rgba(111,115,47,0.15)"/>
  <text x="260" y="423" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(111,115,47,0.9)">Gaziantep</text>

  <!-- Profile photo -->
  <g clip-path="url(#circle)">
    <image href="/photos/profile-2.jpg" x="780" y="135" width="360" height="360" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <circle cx="960" cy="315" r="182" fill="none" stroke="rgba(179,138,88,0.3)" stroke-width="3"/>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(13,31,34,0.6)"/>
  <text x="600" y="620" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">ali-elomer.com</text>
</svg>
